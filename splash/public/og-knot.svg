<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c0c14"/>
      <stop offset="50%" stop-color="#16161f"/>
      <stop offset="100%" stop-color="#181442"/>
    </linearGradient>
    <linearGradient id="thread-a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b6fff"/>
      <stop offset="100%" stop-color="#c8ff2e"/>
    </linearGradient>
    <linearGradient id="thread-b" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec3a8c"/>
      <stop offset="100%" stop-color="#ffb84d"/>
    </linearGradient>
    <radialGradient id="glow-a" cx="0.2" cy="0.18" r="0.6">
      <stop offset="0%" stop-color="#5b6fff" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#5b6fff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-b" cx="0.85" cy="0.85" r="0.55">
      <stop offset="0%" stop-color="#ec3a8c" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#ec3a8c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-a)"/>
  <rect width="1200" height="630" fill="url(#glow-b)"/>

  <!-- Faint grid -->
  <g stroke="#f1ecdc" stroke-width="1" opacity="0.04">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
  </g>

  <!-- Knot mark, oversized at left -->
  <g transform="translate(80,160) scale(5.2)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 14 32 C 14 18 26 14 32 22 C 38 30 50 30 50 18" stroke="url(#thread-a)" stroke-width="4"/>
    <path d="M 50 18 C 50 30 38 30 32 38 C 26 46 14 46 14 32" stroke="url(#thread-a)" stroke-width="4"/>
    <path d="M 14 18 C 14 30 26 30 32 22" stroke="url(#thread-b)" stroke-width="4"/>
    <path d="M 32 38 C 38 46 50 46 50 32 C 50 18 38 14 32 22" stroke="url(#thread-b)" stroke-width="4"/>
  </g>

  <!-- Wordmark + tagline at right -->
  <g font-family="ui-serif, Georgia, serif" fill="#f1ecdc">
    <text x="500" y="270" font-size="78" font-weight="700" letter-spacing="-2">astro-knots</text>
    <text x="500" y="328" font-size="32" fill="#c8c1ad" font-style="italic">Loose threads, tied with intent.</text>
    <text x="500" y="400" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#5b6fff">12 sites · 3 modes · 1 published package</text>
  </g>

  <!-- Footer thread -->
  <g stroke-width="2" fill="none" opacity="0.5">
    <path d="M 80 580 Q 200 560 320 580 T 560 580 T 800 580 T 1040 580 T 1120 580" stroke="url(#thread-a)"/>
    <path d="M 80 588 Q 200 608 320 588 T 560 588 T 800 588 T 1040 588 T 1120 588" stroke="url(#thread-b)"/>
  </g>
</svg>
